    <main>
      <section class="flex-grow-1 py-5 min-vh-100">
        <div class="container">
          <h1 class="text-center mb-5">
            <i class="bi bi-envelope" aria-hidden="true"></i> Contato
            <i class="bi bi-envelope" aria-hidden="true"></i>
          </h1>
          <div class="row justify-content-center">
            <div class="col-md-6">
              <form id="contactForm">
                <div class="mb-3">
                  <label for="name" class="form-label">Nome</label>
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    placeholder="Seu nome"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Seu email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="message" class="form-label">Mensagem</label>
                  <textarea
                    class="form-control"
                    id="message"
                    rows="5"
                    placeholder="Sua mensagem"
                    required
                  ></textarea>
                </div>
                <button
                  type="submit"
                  class="btn btn-dark w-100"
                  disabled="disabled"
                >
                  <i class="bi bi-send" aria-hidden="true"></i> Enviar
                </button>
              </form>
              <div
                id="successMessage"
                class="alert alert-success mt-3 d-none"
                role="alert"
              >
                Obrigado! Sua mensagem foi enviada.
              </div>
            </div>
            <div class="col-12 col-md-4 mt-4 mt-md-0">
              <h5 class="mb-3 text-center text-md-start">Contato rápido</h5>
              <div
                class="d-flex justify-content-center justify-content-md-start gap-3"
              >
                <a
                  href="mailto:jorgenettocjunior@gmail.com"
                  class="text-danger text-center"
                  aria-label="Enviar e-mail"
                  ><i class="bi bi-envelope-fill fs-4" aria-hidden="true"></i
                  ><br />Email </a
                ><a
                  href="https://github.com/JNCJcoder"
                  target="_blank"
                  class="text-dark text-center"
                  aria-label="Perfil no GitHub"
                  ><i class="bi bi-github fs-4" aria-hidden="true"></i
                  ><br />GitHub </a
                ><a
                  href="https://linkedin.com/in/JNCJcoder"
                  target="_blank"
                  class="text-primary text-center"
                  aria-label="Perfil no LinkedIn"
                  ><i class="bi bi-linkedin fs-4" aria-hidden="true"></i
                  ><br />LinkedIn</a
                >
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="bg-dark text-light py-4">

            ><i class="bi bi-github fs-5" aria-hidden="true"></i> </a
          ><a
            href="https://linkedin.com/JNCJcoder"
            target="_blank"
            class="text-primary me-3"
            aria-label="Perfil no LinkedIn"
            ><i class="bi bi-linkedin fs-5" aria-hidden="true"></i> </a
          ><a
            href="mailto:jorgenettocjunior@gmail.com"
            class="text-danger"
            aria-label="Enviar e-mail"
            ><i class="bi bi-envelope-fill fs-5" aria-hidden="true"></i
          ></a>
        </div>
